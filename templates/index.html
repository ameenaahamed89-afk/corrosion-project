<!DOCTYPE html>
<html>
<head>
    <title>AI Corrosion Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            color: white;
        }

        .container {
            margin-top: 80px;
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 20px 0;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        img {
            margin-top: 20px;
            border-radius: 10px;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

    <h1>🤖 AI Corrosion Detection System</h1>

    <div class="container">
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="image" required>
            <br>
            <button type="submit">🔍 Detect Corrosion</button>
        </form>

        {% if result %}
            <div class="result">{{ result }}</div>
            <img src="{{ url_for('static', filename=image_file) }}" width="300">
        {% endif %}

        <div class="footer">
            Built using Python + AI | Hackathon Project
        </div>
    </div>

</body>
</html>
